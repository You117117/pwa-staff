<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Resto QR — Staff</title>
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#0b1220" />
  <link rel="stylesheet" href="./assets/style.css?v=20260313-8" />
</head>

<body>
  <h1>Resto QR — Staff</h1>

  <div class="topbar">
    <label>URL API</label>
    <input type="text" id="apiUrl" placeholder="https://..." />
    <button id="btnSaveApi">Mémoriser</button>
    <button id="btnHealth">Tester /health</button>
  </div>

  <div class="layout">
    <div class="tables-section">
      <div class="section-head">
        <h2>Tables</h2>
        <div class="controls">
          <select id="filterTables">
            <option value="Toutes">Toutes</option>
            <option value="T1">T1</option>
            <option value="T2">T2</option>
            <option value="T3">T3</option>
            <option value="T4">T4</option>
            <option value="T5">T5</option>
            <option value="T6">T6</option>
            <option value="T7">T7</option>
            <option value="T8">T8</option>
            <option value="T9">T9</option>
            <option value="T10">T10</option>
          </select>
          <button id="btnRefreshTables">Rafraîchir</button>
        </div>
      </div>

      <div id="tablesEmpty" class="empty">Aucune table</div>
      <div id="tables" class="tables"></div>
    </div>

    <div class="summary-section">
      <div class="section-head">
        <h2>Résumé du jour</h2>
        <button id="btnRefreshSummary">Rafraîchir</button>
      </div>

      <div id="summaryKpis" class="kpiGrid"></div>
      <div id="summaryEmpty" class="empty">Aucune session aujourd’hui.</div>
      <div id="summary" class="summary"></div>

      <div class="subsection-head">
        <h3>Historique des sessions</h3>
        <div class="controls controls--tight">
          <input type="date" id="historyDate" />
          <select id="historyTableFilter">
            <option value="">Toutes les tables</option>
            <option value="T1">T1</option>
            <option value="T2">T2</option>
            <option value="T3">T3</option>
            <option value="T4">T4</option>
            <option value="T5">T5</option>
            <option value="T6">T6</option>
            <option value="T7">T7</option>
            <option value="T8">T8</option>
            <option value="T9">T9</option>
            <option value="T10">T10</option>
          </select>
          <select id="historyTypeFilter">
            <option value="all">Tout</option>
            <option value="normal">Encodée en caisse</option>
            <option value="anomaly">Anomalie</option>
            <option value="active">Actives</option>
          </select>
          <button id="btnRefreshHistory">Rafraîchir</button>
        </div>
      </div>
      <div id="historyEmpty" class="empty">Aucune session dans l’historique.</div>
      <div id="historyList" class="summary historyList"></div>

      <div class="subsection-head">
        <h3>Manager cockpit</h3>
        <div class="controls controls--tight">
          <input type="date" id="managerStartDate" />
          <input type="date" id="managerEndDate" />
          <select id="managerTableFilter">
            <option value="">Toutes les tables</option>
            <option value="T1">T1</option>
            <option value="T2">T2</option>
            <option value="T3">T3</option>
            <option value="T4">T4</option>
            <option value="T5">T5</option>
            <option value="T6">T6</option>
            <option value="T7">T7</option>
            <option value="T8">T8</option>
            <option value="T9">T9</option>
            <option value="T10">T10</option>
          </select>
          <button id="btnRefreshManager">Rafraîchir</button>
        </div>
      </div>
      <div id="managerKpis" class="kpiGrid"></div>
      <div id="managerEmpty" class="empty">Aucune donnée manager disponible.</div>
      <div class="manager-grid">
        <div class="manager-panel">
          <h4>Top tables</h4>
          <div id="managerByTable" class="summary managerList"></div>
        </div>
        <div class="manager-panel">
          <h4>Flux horaire</h4>
          <div id="managerByHour" class="summary managerList"></div>
        </div>
      </div>
      <div class="manager-panel manager-panel--full">
        <h4>Sessions récentes</h4>
        <div id="managerRecentSessions" class="summary managerList"></div>
      </div>

      <div class="subsection-head">
        <h3>Diagnostic</h3>
        <div class="controls controls--tight controls--stackable">
          <select id="diagSeverityFilter">
            <option value="">Toutes sévérités</option>
            <option value="info">Info</option>
            <option value="warn">Warn</option>
            <option value="error">Erreur</option>
          </select>
          <select id="diagTypeFilter">
            <option value="">Tous les types</option>
            <option value="session">Session</option>
            <option value="order">Commande</option>
            <option value="close_table">Clôture</option>
            <option value="pos_confirmation">Encodage caisse</option>
            <option value="print">Impression</option>
            <option value="summary">Résumé</option>
            <option value="manager_summary">Manager</option>
            <option value="history">Historique</option>
          </select>
          <select id="diagTableFilter">
            <option value="">Toutes les tables</option>
            <option value="T1">T1</option>
            <option value="T2">T2</option>
            <option value="T3">T3</option>
            <option value="T4">T4</option>
            <option value="T5">T5</option>
            <option value="T6">T6</option>
            <option value="T7">T7</option>
            <option value="T8">T8</option>
            <option value="T9">T9</option>
            <option value="T10">T10</option>
          </select>
          <input type="text" id="diagSessionFilter" placeholder="Session ID" />
          <label class="checkbox-inline"><input type="checkbox" id="diagIncludeAudit" /> Inclure audit</label>
          <button id="btnRefreshDiagnostic">Rafraîchir</button>
        </div>
      </div>
      <div id="diagnosticKpis" class="kpiGrid kpiGrid--small"></div>
      <div id="diagnosticBreakdown" class="kpiGrid kpiGrid--small"></div>
      <div id="diagnosticErrors" class="summary diagnosticErrors"></div>
      <div id="diagnosticEmpty" class="empty">Aucun événement diagnostic disponible.</div>
      <div id="diagnosticList" class="summary diagnosticList"></div>
    </div>
  </div>

  <script src="./js/bridge-orders-staff.js"></script>
  <script src="./js/app.js?v=20260313-8"></script>
  <script src="./js/table-status.js"></script>
  <script src="./js/table-detail.js?v=20260313-7"></script>
<!-- workflow-pos-v2 -->
</body>
</html>
